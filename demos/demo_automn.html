<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autumn AI — Démo</title>

  <!-- ===== Les 4 scripts CDN obligatoires (ordre imposé) ===== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Police Inter (avec repli système robuste si hors-ligne) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== Réglages de base imposés ===== */
    html, body, #root { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    /* ===== Variables de thème : palette neutre élégante + 1 accent ambré « automne » ===== */
    :root {
      --bg: #ffffff;
      --bg-2: #f7f6f3;        /* barre latérale */
      --bg-3: #ffffff;        /* surfaces surélevées */
      --bg-hover: #eeece8;
      --text: #1d1c1a;
      --text-2: #6f6d68;
      --text-3: #9d9a93;
      --border: #ece9e4;
      --border-2: #e1ddd7;
      --accent: #c2683c;       /* ambre brûlé subtil */
      --accent-2: #b15a30;
      --accent-soft: #f4e8e0;
      --user-bubble: #f2f1ed;
      --code-bg: #1c1b1f;
      --code-text: #e7e2dc;
      --code-head: #161519;
      --shadow-sm: 0 1px 2px rgba(20,16,12,.05);
      --shadow-lg: 0 4px 14px rgba(20,16,12,.06), 0 18px 40px rgba(20,16,12,.07);
      --radius: 18px;
    }
    .dark {
      --bg: #1b1a18;
      --bg-2: #151412;
      --bg-3: #211f1c;
      --bg-hover: #272420;
      --text: #ededea;
      --text-2: #a9a69f;
      --text-3: #75726b;
      --border: #2b2926;
      --border-2: #343029;
      --accent: #e0905f;
      --accent-2: #e8a576;
      --accent-soft: #36281f;
      --user-bubble: #26231f;
      --code-bg: #121113;
      --code-text: #e7e2dc;
      --code-head: #0d0c0e;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow-lg: 0 4px 14px rgba(0,0,0,.3), 0 18px 40px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ===== Barres de défilement discrètes ===== */
    .scroll-area::-webkit-scrollbar { width: 9px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
    .scroll-area::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: padding-box; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }

    /* ===== Animations / micro-interactions ===== */
    @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .msg-in { animation: msgIn .45s cubic-bezier(.21,.99,.36,1) both; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn .5s ease both; }

    @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
    .pop-in { animation: pop .4s cubic-bezier(.21,.99,.36,1) both; }

    /* Curseur clignotant de génération */
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .caret { display: inline-block; width: 8px; height: 1.05em; transform: translateY(2px); margin-left: 2px; background: var(--accent); border-radius: 1px; animation: blink 1s steps(1) infinite; }

    /* Indicateur « en train d'écrire » (3 points) */
    @keyframes dotJump { 0%,60%,100% { transform: translateY(0); opacity:.4; } 30% { transform: translateY(-5px); opacity:1; } }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); display:inline-block; animation: dotJump 1.2s infinite; }

    /* Transitions douces générales */
    button, a, .tt { transition: background-color .18s ease, color .18s ease, border-color .18s ease, transform .12s ease, box-shadow .18s ease, opacity .18s ease; }

    .conv-item:hover .conv-fade { background: linear-gradient(90deg, transparent, var(--bg-hover) 60%); }

    /* Composant texte : titres, paragraphes, listes, code */
    .prose p { margin: 0 0 14px; line-height: 1.72; color: var(--text); font-size: 15.5px; }
    .prose p:last-child { margin-bottom: 0; }
    .prose h2 { font-size: 19px; font-weight: 700; margin: 4px 0 14px; letter-spacing: -.01em; }
    .prose h3 { font-size: 16px; font-weight: 650; margin: 18px 0 10px; }
    .prose ul, .prose ol { margin: 0 0 14px; padding-left: 4px; list-style: none; }
    .prose li { position: relative; padding-left: 22px; margin: 7px 0; line-height: 1.65; font-size: 15.5px; }
    .prose ul li::before { content: ""; position: absolute; left: 6px; top: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .prose ol { counter-reset: li; }
    .prose ol li { counter-increment: li; }
    .prose ol li::before { content: counter(li); position: absolute; left: 0; top: 1px; width: 18px; height: 18px; font-size: 11px; font-weight: 600; color: var(--accent-2); background: var(--accent-soft); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .prose strong { font-weight: 650; color: var(--text); }
    .prose code.inline { font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; font-size: 13px; background: var(--accent-soft); color: var(--accent-2); padding: 2px 6px; border-radius: 6px; }

    .textarea-auto { resize: none; }
    .focus-ring:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

    .tt:hover { background: var(--bg-hover); }

    @media (max-width: 860px) {
      .sidebar { position: fixed; z-index: 40; height: 100%; transform: translateX(-100%); }
      .sidebar.open { transform: none; }
      .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 30; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ===== Code source React (JSX) — transformé au runtime en mode « classic » ===== -->
  <script type="text/jsx-source" id="appSrc">
    const { useState, useEffect, useRef } = React;

    /* =========================================================================
       ICÔNES SVG INLINE (aucune image externe)
    ========================================================================= */
    const Icon = {
      Leaf: (p) => (
        <svg viewBox="0 0 24 24" width={p.s||20} height={p.s||20} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">

      Send: (p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>),
      Sun: (p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>),
      Moon: (p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>),
      Chevron: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>),
      Menu: (p) => (<svg viewBox="0 0 24 24" width={p.s||20} height={p.s||20} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>),
      Copy: (p) => (<svg viewBox="0 0 24 24" width={p.s||15} height={p.s||15} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="11" height="11" rx="2.5"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>),
      Check: (p) => (<svg viewBox="0 0 24 24" width={p.s||15} height={p.s||15} fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>),
      Edit: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>),
      Spark: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.8 4.7L18 9.5l-4.2 1.8L12 16l-1.8-4.7L6 9.5l4.2-1.8z"/></svg>),
      Layers: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l9 5-9 5-9-5z"/><path d="M3 13l9 5 9-5"/></svg>),
      Doc: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M8 13h8M8 17h6"/></svg>),
      Grid: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>),
    };

    /* =========================================================================
       DONNÉES FACTICES — 100% local, aucune API
       Reflètent les VRAIES capacités d'Autumn AI :
       pipeline multi-agents (Llama 3 + Hermes 2 Pro) qui transforme des
       composants XML métier + une description en entités JSON, documentation,
       cahier des charges et interfaces UI (domaine assurance santé).
    ========================================================================= */

    // Personas / modèles sélectionnables dans la barre du haut
    const PERSONAS = [
      { id: "pipeline", name: "Autumn Pipeline", desc: "Multi-agents · Llama 3 + Hermes 2 Pro", Ic: Icon.Layers },
      { id: "modeleur", name: "Modéliseur d'entités", desc: "XML → entité métier JSON", Ic: Icon.Grid },
      { id: "architecte", name: "Architecte UI", desc: "Génération d'écrans & cahier des charges", Ic: Icon.Spark },
    ];

    // Réponses scriptées (markdown). On évite les guillemets droits dans les
    // chaînes en prose grâce aux guillemets français « » ; le code JSON est
    // stocké en chaînes simples avec apostrophes échappées.
    const R = (...lines) => lines.join("\n");

    const REP_UI = R(
      "## Génération d'interface — Gestion des demandes de remboursement",
      "",
      "J'ai analysé les entités métier (`DemandeRemboursementCp`, `ActeCp`, `OrdonnanceCp`, `Tiers`) et votre description fonctionnelle. Voici l'architecture d'écrans proposée :",
      "",
      "### 1. Liste des demandes à traiter",
      "- `demandTable` — un **DataGrid** des demandes en cours (disposition verticale)",
      "- `searchBar` — un **SearchInput** de recherche par mot-clé, placé en haut",
      "- Actions : « Visualiser la liste » et « Accéder au détail »",
      "",
      "### 2. Détail d'une demande",
      "- Champs : identifiant de l'assuré, montant à rembourser, date des soins, type de soin",
      "- Actions : **Valider**, **Mettre en attente**, **Rejeter**, **Ajouter un commentaire**",
      "",
      "### 3. Historique & exportation",
      "- `demandHistoryTable` filtrable via `filterBar`",
      "- `exportOptions` (CSV / Excel / PDF) avec un bouton **Exporter**",
      "",
      "Spécification générée (extrait) :",
      "",
      "```json",
      "{",
      '  "interface": "Liste des demandes a traiter",',
      '  "composants": [',
      '    { "code": "demandTable", "type": "DataGrid", "layout": "vertical" },',
      '    { "code": "searchBar", "type": "SearchInput", "position": "top" }',
      "  ],",
      '  "actions": ["Visualiser la liste", "Acceder au detail"],',
      '  "roles": ["Agent de saisie", "Agent valideur", "Superviseur"],',
      '  "prochaine_etape": "InitialiserContexte"',
      "}",
      "```",
      "",
      "Souhaitez-vous que je génère le **cahier des charges complet** des 4 écrans, ou la maquette de l'un d'eux ?"
    );

    const REP_MODEL = R(
      "## Modélisation d'une entité métier",
      "",
      "À partir du composant `<Composant-Definition code=\"OrdonnanceCp\">`, l'agent **Hermes 2 Pro** produit une entité métier normalisée :",
      "",
      "```json",
      "{",
      '  "code": "OrdonnanceCp",',
      '  "type": "TYPE_BEAN_COMP",',
      '  "attributs": [',
      '    { "nom": "dateExecution", "type": "TYPE_ATTR_DATE", "obligatoire": false },',
      '    { "nom": "iNPE", "type": "TYPE_ATTR_STR", "obligatoire": false },',
      '    { "nom": "prixFacture", "type": "TYPE_ATTR_DOUBLE", "obligatoire": false }',
      "  ],",
      '  "relations": [',
      "    {",
      '      "nom": "DocumentCp",',
      '      "type": "TYPE_BEAN_COMP",',
      '      "cardinalite": "1:1",',
      '      "attributs": [ { "nom": "signaturePharmacien", "type": "TYPE_ATTR_DP" } ]',
      "    }",
      "  ],",
      '  "description": "Entite metier representant une ordonnance de comptabilite"',
      "}",
      "```",
      "",
      "Les cardinalités sont normalisées automatiquement (`TYPE_RELATION_SIMPLE` → `1:1`, `TYPE_RELATION_MULTIPLE` → `1:N`) et une description par défaut est ajoutée si elle manque.",
      "",
      "Je peux maintenant **documenter** cette entité ou la croiser avec les autres pour le cahier des charges."
    );

    const REP_CAHIER = R(
      "## Cahier des charges — Écrans à générer",
      "",
      "En croisant les entités métier et la description fonctionnelle, voici le cahier des charges structuré des interfaces, **adapté par rôle utilisateur** :",
      "",
      "```json",
      "[",
      "  {",
      '    "interface": "Liste des demandes a traiter",',
      '    "roles": ["Agent de saisie", "Agent valideur", "Superviseur"],',
      '    "champs": ["Identifiant assure", "Montant a rembourser", "Date des soins", "Type de soin"],',
      '    "actions": ["Visualiser la liste", "Acceder au detail"],',
      '    "prochaine_etape": "InitialiserContexte"',
      "  },",
      "  {",
      '    "interface": "Detail d une demande",',
      '    "roles": ["Agent valideur", "Superviseur"],',
      '    "actions": ["Valider", "Mettre en attente", "Rejeter", "Ajouter un commentaire"],',
      '    "prochaine_etape": "SaisirDetails"',
      "  },",
      "  {",
      '    "interface": "Historique des demandes",',
      '    "roles": ["Superviseur"],',
      '    "actions": ["Consulter historique", "Filtrer par statut, date ou type de soin"],',
      '    "prochaine_etape": null',
      "  }",
      "]",
      "```",
      "",
      "> Les champs et actions varient selon le rôle : un *Agent de saisie* ne voit pas les actions de validation réservées au *Valideur* et au *Superviseur*."
    );

    const REP_DOC = R(
      "## Documentation — `OrdonnanceCp`",
      "",
      "**Entité métier représentant une ordonnance de comptabilité.**",
      "",
      "### Informations de base",
      "- `id` — identifiant unique de l'ordonnance",
      "- `numeroDossier` — numéro de dossier associé",
      "",
      "### Données patient",
      "- `cinPatient` — numéro de l'assuré ayant reçu l'ordonnance",
      "- `raisonSociale` — raison sociale de l'assuré",
      "- `dateNaissance` — date de naissance du patient",
      "",
      "### Données médicales & financières",
      "- `iNPE` — code INPE associé à l'ordonnance",
      "- `prixFacture` — montant total de la facture",
      "- `dateExecution` — date de réalisation de l'ordonnance",
      "",
      "### Suivi & documents",
      "- `statut` — état actuel (en cours, résolu…)",
      "- `DocumentCp` — relation **1:1**, inclut `signaturePharmacien` (date et heure de signature)",
      "",
      "Cette documentation est générée automatiquement à l'**étape 3** du pipeline, à partir de l'entité JSON normalisée."
    );

    const REP_SYNTH = R(
      "## Synthèse métier — domaine assurance santé",
      "",
      "Les entités `ActeCp`, `DemandeRemboursementCp`, `OrdonnanceCp` et `Tiers` collaborent pour gérer les sinistres santé de bout en bout :",
      "",
      "- **ActeCp** — actes de soins : code acte, date, INPE, montant de facturation",
      "- **DemandeRemboursementCp** — demandes : validation, établissement, médecin traitant, statut",
      "- **OrdonnanceCp** — ordonnances et documents associés (signature pharmacien)",
      "- **Tiers** — parties prenantes (assurés, professionnels) : identité, statut, contacts",
      "",
      "Ensemble, elles assurent **traçabilité, validation et traitement** des remboursements, en garantissant la précision et la transparence des données."
    );

    const REP_DEFAULT = R(
      "## Autumn AI — assistant de génération d'interfaces",
      "",
      "Je suis **Autumn AI**, un agent qui transforme des spécifications métier en applications. Mon pipeline enchaîne plusieurs modèles locaux :",
      "",
      "1. **Étape 1 · Llama 3** — parsing et normalisation des composants XML (`<Composant-Definition>`)",
      "2. **Étape 2 · Hermes 2 Pro** — modélisation des entités métier (attributs, relations, cardinalités)",
      "3. **Étape 3+** — documentation, synthèse métier et **cahier des charges**",
      "4. **Génération UI** — DataGrid, SearchInput, formulaires, actions (Valider / Rejeter / Exporter)",
      "",
      "Je peux par exemple :",
      "- transformer un composant XML en entité JSON ;",
      "- générer le cahier des charges d'une application ;",
      "- produire la maquette d'écrans à partir des entités ;",
      "- documenter et synthétiser un modèle métier.",
      "",
      "Décrivez votre besoin ou choisissez une suggestion pour commencer."
    );

    // Routeur de réponses : associe le texte de l'utilisateur à une réponse scriptée
    function getResponse(text) {
      const t = (text || "").toLowerCase();
      if (t.includes("document")) return REP_DOC;
      if (t.includes("cahier")) return REP_CAHIER;
      if (t.includes("synth")) return REP_SYNTH;
      if (t.includes("xml") || t.includes("modél") || t.includes("modelis") || t.includes("entité json") || t.includes("entite json")) return REP_MODEL;
      if (t.includes("interface") || t.includes("rembours") || t.includes("écran") || t.includes("ecran") || t.includes("génér") || t.includes("gener") || t.includes("maquette")) return REP_UI;
      return REP_DEFAULT;
    }

    // Conversations d'historique pré-remplies dans la barre latérale
    const SEED_CONVS = [
      {
        id: "c1", title: "Interface — Demandes de remboursement",
        messages: [
          { role: "user", content: "Génère l'interface de gestion des demandes de remboursement." },
          { role: "assistant", content: REP_UI },
        ],
      },
      {
        id: "c2", title: "Modélisation de l'entité OrdonnanceCp",
        messages: [
          { role: "user", content: "Transforme le composant XML OrdonnanceCp en entité métier JSON." },
          { role: "assistant", content: REP_MODEL },
        ],
      },
      {
        id: "c3", title: "Cahier des charges — Assurance santé",
        messages: [
          { role: "user", content: "Rédige le cahier des charges des écrans à partir des entités." },
          { role: "assistant", content: REP_CAHIER },
        ],
      },
      {
        id: "c4", title: "Synthèse du modèle métier",
        messages: [
          { role: "user", content: "Fais une synthèse métier des entités du domaine." },
          { role: "assistant", content: REP_SYNTH },
        ],
      },
    ];

    // Suggestions de l'écran d'accueil
    const SUGGESTIONS = [
      { Ic: Icon.Grid, title: "Générer une interface", sub: "Demandes de remboursement", prompt: "Génère l'interface de gestion des demandes de remboursement." },
      { Ic: Icon.Layers, title: "Modéliser une entité", sub: "XML → entité métier JSON", prompt: "Transforme le composant XML OrdonnanceCp en entité métier JSON." },
      { Ic: Icon.Doc, title: "Cahier des charges", sub: "Écrans de l'application", prompt: "Rédige le cahier des charges des écrans à partir des entités." },
      { Ic: Icon.Spark, title: "Documenter une entité", sub: "OrdonnanceCp", prompt: "Documente l'entité OrdonnanceCp." },
    ];

    /* =========================================================================
       RENDU MARKDOWN LÉGER (titres, listes, gras, code inline, blocs de code)
       Tolérant aux blocs de code non terminés (pour l'effet streaming).
    ========================================================================= */

    // Rendu du texte « inline » : **gras** et `code`
    function renderInline(text, key) {
      const parts = text.split(/(\*\*[^*]+\*\*|`[^`]+`)/g);
      return parts.map((p, i) => {
        if (p.startsWith("**") && p.endsWith("**")) return <strong key={key + "-" + i}>{p.slice(2, -2)}</strong>;
        if (p.startsWith("`") && p.endsWith("`")) return <code className="inline" key={key + "-" + i}>{p.slice(1, -1)}</code>;
        return p;
      });
    }

    // Bloc de code avec en-tête, langage et bouton « Copier » (factice + copie réelle si dispo)
    function CodeBlock({ code, lang }) {
      const [copied, setCopied] = useState(false);
      const doCopy = () => {
        try { if (navigator.clipboard) navigator.clipboard.writeText(code); } catch (e) {}
        setCopied(true);
        setTimeout(() => setCopied(false), 1600);
      };
      return (
        <div style={{ borderRadius: 14, overflow: "hidden", margin: "14px 0", boxShadow: "var(--shadow-sm)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--code-head)", padding: "8px 12px" }}>
            <span style={{ fontSize: 12, color: "#9b968f", fontFamily: "ui-monospace, monospace", letterSpacing: ".02em" }}>{lang || "code"}</span>
            <button onClick={doCopy} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: copied ? "#7fd49a" : "#b8b3ab", background: "transparent", border: "none", cursor: "pointer", padding: "3px 6px", borderRadius: 6 }}>
              {copied ? <Icon.Check s={14} /> : <Icon.Copy s={14} />}
              {copied ? "Copié" : "Copier"}
            </button>
          </div>
          <pre style={{ margin: 0, background: "var(--code-bg)", color: "var(--code-text)", padding: "14px 16px", overflowX: "auto", fontSize: 13, lineHeight: 1.65, fontFamily: "'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" }} className="scroll-area">
            <code>{code}</code>
          </pre>
        </div>
      );
    }

    // Parseur markdown -> éléments React
    function Markdown({ text }) {
      const lines = (text || "").split("\n");
      const blocks = [];
      let i = 0, key = 0;
      let para = [], list = null, listType = null;

      const flushPara = () => { if (para.length) { blocks.push(<p key={"p" + key++}>{renderInline(para.join(" "), "p" + key)}</p>); para = []; } };
      const flushList = () => {
        if (list && list.length) {
          const items = list.map((it, j) => <li key={j}>{renderInline(it, "li" + key + j)}</li>);
          blocks.push(listType === "ol" ? <ol key={"l" + key++}>{items}</ol> : <ul key={"l" + key++}>{items}</ul>);
        }
        list = null; listType = null;
      };

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        // Bloc de code ``` ... ```
        if (trimmed.startsWith("```")) {
          flushPara(); flushList();
          const lang = trimmed.slice(3).trim();
          const buf = [];
          i++;
          while (i < lines.length && !lines[i].trim().startsWith("```")) { buf.push(lines[i]); i++; }
          blocks.push(<CodeBlock key={"c" + key++} lang={lang} code={buf.join("\n")} />);
          i++; // saute le ``` de fermeture (ou la fin)
          continue;
        }

        // Titres
        const h = trimmed.match(/^(#{2,3})\s+(.*)$/);
        if (h) { flushPara(); flushList(); const Tag = h[1].length === 2 ? "h2" : "h3"; blocks.push(<Tag key={"h" + key++}>{renderInline(h[2], "h" + key)}</Tag>); i++; continue; }

        // Citation
        if (trimmed.startsWith("> ")) {
          flushPara(); flushList();
          blocks.push(
            <div key={"q" + key++} style={{ borderLeft: "3px solid var(--accent)", padding: "6px 14px", margin: "12px 0", color: "var(--text-2)", fontSize: 14.5, background: "var(--accent-soft)", borderRadius: "0 10px 10px 0" }}>
              {renderInline(trimmed.slice(2), "q" + key)}
            </div>
          );
          i++; continue;
        }

        // Listes (puces ou numéros)
        const ul = trimmed.match(/^[-•]\s+(.*)$/);
        const ol = trimmed.match(/^\d+\.\s+(.*)$/);
        if (ul || ol) {
          flushPara();
          const type = ul ? "ul" : "ol";
          if (listType && listType !== type) flushList();
          listType = type; list = list || [];
          list.push((ul ? ul[1] : ol[1]));
          i++; continue;
        }

        // Ligne vide -> fin de paragraphe/liste
        if (trimmed === "") { flushPara(); flushList(); i++; continue; }

        // Paragraphe
        flushList();
        para.push(trimmed);
        i++;
      }
      flushPara(); flushList();
      return <div className="prose">{blocks}</div>;
    }

    function MessageRow({ role, content, streaming }) {
      const isUser = role === "user";

    /* =========================================================================

    function PersonaSelect({ persona, setPersona }) {

      useEffect(() => {

            {/* Réalisé chez (logos entreprises) */}

              <div style={{ fontSize: 10.5, fontWeight: 600, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: ".06em", margin: "0 0 8px 1px" }}>Réalisé chez</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <img src="../assets/works-platform.svg" alt="Works Platform" style={{ height: 26, background: "#fff", borderRadius: 6, padding: "4px 7px" }} />
                <img src="../assets/caciopee.svg" alt="Caciopee" style={{ height: 26, background: "#fff", borderRadius: 6, padding: "4px 7px" }} />

            {/* Bloc profil */}
            <div style={{ padding: 10 }}>
              <div className="tt" style={{ display: "flex", alignItems: "center", gap: 11, padding: "8px 9px", borderRadius: 12, cursor: "pointer" }}>
                <div style={{ width: 34, height: 34, borderRadius: 10, background: "linear-gradient(140deg,#6a5b4f,#3f3833)", color: "#fff", display: "grid", placeItems: "center", fontWeight: 700, fontSize: 13 }}>EM</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 650, color: "var(--text)" }}>El Moussaif</div>
                  <div style={{ fontSize: 12, color: "var(--text-3)" }}>Autumn · Édition Démo</div>

    /* =========================================================================
       ÉCRAN D'ACCUEIL
    ========================================================================= */
    function Welcome({ onPick }) {
      return (
        <div className="fade-in" style={{ maxWidth: 768, margin: "0 auto", padding: "0 24px", width: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%" }}>
          <div style={{ width: 60, height: 60, borderRadius: 18, display: "grid", placeItems: "center", color: "#fff", background: "linear-gradient(140deg, var(--accent), var(--accent-2))", boxShadow: "var(--shadow-lg)", marginBottom: 22 }}>
            <Icon.Leaf s={32} />
          </div>
          <h1 style={{ fontSize: 30, fontWeight: 700, letterSpacing: "-.02em", margin: "0 0 10px", textAlign: "center" }}>Bonjour, je suis Autumn AI</h1>
          <p style={{ fontSize: 16, color: "var(--text-2)", textAlign: "center", maxWidth: 540, margin: "0 0 34px", lineHeight: 1.6 }}>
            Je transforme vos composants XML et descriptions métier en <strong style={{ color: "var(--text)" }}>entités</strong>, <strong style={{ color: "var(--text)" }}>cahiers des charges</strong> et <strong style={{ color: "var(--text)" }}>interfaces</strong> prêtes à l'emploi.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12, width: "100%" }}>
            {SUGGESTIONS.map((s, i) => (
              <button key={i} onClick={() => onPick(s.prompt)} className="tt" style={{ textAlign: "left", padding: "16px 16px", borderRadius: 15, background: "var(--bg-3)", border: "1px solid var(--border)", cursor: "pointer", boxShadow: "var(--shadow-sm)", display: "flex", gap: 13, alignItems: "flex-start" }}>
                <span style={{ color: "var(--accent)", marginTop: 1, flexShrink: 0 }}><s.Ic s={19} /></span>
                <span>
                  <span style={{ display: "block", fontWeight: 650, fontSize: 14.5, color: "var(--text)" }}>{s.title}</span>
                  <span style={{ display: "block", fontSize: 13, color: "var(--text-2)", marginTop: 3 }}>{s.sub}</span>
                </span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* =========================================================================
       BARRE DE SAISIE (textarea auto-extensible + envoi + raccourci Entrée)
    ========================================================================= */
    function Composer({ onSend, disabled }) {
      const [val, setVal] = useState("");
      const taRef = useRef(null);

      // Auto-extension de la hauteur du textarea
      const autoGrow = () => {
        const el = taRef.current;
        if (!el) return;
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 200) + "px";
      };
      useEffect(autoGrow, [val]);

      const submit = () => {
        const v = val.trim();
        if (!v || disabled) return;
        onSend(v);
        setVal("");
      };
      const onKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
      };

      return (
        <div style={{ padding: "10px 24px 18px", background: "linear-gradient(to top, var(--bg) 60%, transparent)" }}>
          <div style={{ maxWidth: 768, margin: "0 auto" }}>
            <div className="focus-ring" style={{ display: "flex", alignItems: "flex-end", gap: 8, background: "var(--bg-3)", border: "1px solid var(--border-2)", borderRadius: 24, padding: "8px 8px 8px 18px", boxShadow: "var(--shadow-lg)" }}>
              <textarea
                ref={taRef}
                value={val}
                rows={1}
                onChange={(e) => setVal(e.target.value)}
                onKeyDown={onKey}
                placeholder="Décrivez l'interface ou l'entité à générer…"
                className="textarea-auto scroll-area"
                style={{ flex: 1, border: "none", outline: "none", background: "transparent", color: "var(--text)", fontSize: 15.5, lineHeight: 1.5, fontFamily: "inherit", padding: "8px 0", maxHeight: 200 }}
              />
              <button
                onClick={submit}
                disabled={disabled || !val.trim()}
                style={{ width: 38, height: 38, borderRadius: 14, border: "none", cursor: (disabled || !val.trim()) ? "default" : "pointer", display: "grid", placeItems: "center", color: "#fff", background: (disabled || !val.trim()) ? "var(--border-2)" : "linear-gradient(140deg, var(--accent), var(--accent-2))", flexShrink: 0, opacity: (disabled || !val.trim()) ? .7 : 1 }}
              >
                <Icon.Send s={18} />
              </button>
            </div>
            <div style={{ textAlign: "center", fontSize: 12, color: "var(--text-3)", marginTop: 10 }}>
              Autumn AI · démonstration locale — réponses simulées, aucune donnée envoyée.
            </div>
          </div>
        </div>
      );
    }

    /* =========================================================================
       APPLICATION PRINCIPALE
    ========================================================================= */
    function App() {
      const [dark, setDark] = useState(false);
      const [convs, setConvs] = useState(SEED_CONVS);
      const [activeId, setActiveId] = useState(null); // null => écran d'accueil
      const [persona, setPersona] = useState(PERSONAS[0]);
      const [streaming, setStreaming] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const scrollRef = useRef(null);
      const timerRef = useRef(null);

      // Application du thème clair/sombre sur la racine du document
      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
      }, [dark]);

      const active = convs.find(c => c.id === activeId) || null;

      // Auto-scroll vers le bas à chaque mise à jour
      useEffect(() => {
        const el = scrollRef.current;
        if (el) el.scrollTop = el.scrollHeight;
      }, [active && active.messages, streaming]);

      // Nettoyage du timer de streaming au démontage
      useEffect(() => () => clearInterval(timerRef.current), []);

      // Met à jour le contenu du dernier message d'une conversation
      const setLastAssistant = (convId, text) => {
        setConvs(prev => prev.map(c => {
          if (c.id !== convId) return c;
          const msgs = c.messages.slice();
          msgs[msgs.length - 1] = { role: "assistant", content: text };
          return { ...c, messages: msgs };
        }));
      };

      // Effet « génération » : tape la réponse caractère par caractère
      const streamInto = (convId, fullText) => {
        setStreaming(true);
        // Petite latence « réflexion » (les 3 points s'affichent) avant la frappe
        setTimeout(() => {
          let idx = 0;
          clearInterval(timerRef.current);
          timerRef.current = setInterval(() => {
            // On avance par petits paquets pour une frappe fluide et rapide
            idx += 3;
            if (idx >= fullText.length) {
              idx = fullText.length;
              setLastAssistant(convId, fullText);
              clearInterval(timerRef.current);
              setStreaming(false);
            } else {
              setLastAssistant(convId, fullText.slice(0, idx));
            }
          }, 12);
        }, 480);
      };

      // Envoi d'un message (depuis la barre de saisie ou une suggestion)
      const handleSend = (text) => {
        if (streaming) return;
        const reply = getResponse(text);

        if (!activeId) {
          // Crée une nouvelle conversation depuis l'écran d'accueil
          const id = "c" + Date.now();
          const title = text.length > 42 ? text.slice(0, 42) + "…" : text;
          const conv = { id, title, messages: [ { role: "user", content: text }, { role: "assistant", content: "" } ] };
          setConvs(prev => [conv, ...prev]);
          setActiveId(id);
          streamInto(id, reply);
        } else {
          // Ajoute à la conversation active
          setConvs(prev => prev.map(c => c.id === activeId
            ? { ...c, messages: [...c.messages, { role: "user", content: text }, { role: "assistant", content: "" }] }
            : c));
          streamInto(activeId, reply);
        }
      };

      const handleNew = () => { if (streaming) return; setActiveId(null); setSidebarOpen(false); };
      const handleSelect = (id) => { if (streaming) return; setActiveId(id); setSidebarOpen(false); };

      const msgs = active ? active.messages : [];

      return (
        <div style={{ display: "flex", height: "100%", overflow: "hidden", background: "var(--bg)" }}>
          {/* Barre latérale */}
          <Sidebar convs={convs} activeId={activeId} onSelect={handleSelect} onNew={handleNew} open={sidebarOpen} onClose={() => setSidebarOpen(false)} />

          {/* Colonne principale */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, height: "100%" }}>
            {/* Barre du haut */}
            <header style={{ height: 58, borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 14px", flexShrink: 0, background: "var(--bg)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {/* Bouton menu (mobile) */}
                <button onClick={() => setSidebarOpen(true)} className="tt" style={{ display: "none", background: "transparent", border: "none", cursor: "pointer", padding: 8, borderRadius: 10, color: "var(--text)" }} id="menuBtn">
                  <Icon.Menu s={20} />
                </button>
                <PersonaSelect persona={persona} setPersona={setPersona} />
              </div>
              {/* Bascule de thème clair/sombre */}
              <button onClick={() => setDark(d => !d)} className="tt" title="Changer de thème" style={{ background: "transparent", border: "1px solid var(--border)", cursor: "pointer", padding: 9, borderRadius: 11, color: "var(--text-2)", display: "grid", placeItems: "center" }}>
                {dark ? <Icon.Sun s={18} /> : <Icon.Moon s={18} />}
              </button>
            </header>

            {/* Zone de chat */}
            <div ref={scrollRef} className="scroll-area" style={{ flex: 1, overflowY: "auto" }}>
              {active ? (
                <div style={{ paddingBottom: 12 }}>
                  {msgs.map((m, i) => (
                    <MessageRow key={i} role={m.role} content={m.content} streaming={streaming && i === msgs.length - 1 && m.role === "assistant"} />
                  ))}
                </div>
              ) : (
                <Welcome onPick={handleSend} />
              )}
            </div>

            {/* Barre de saisie */}
            <Composer onSend={handleSend} disabled={streaming} />
          </div>
        </div>
      );
    }

    /* ===== Affichage du bouton menu uniquement sur petits écrans ===== */
    (function () {
      const apply = () => {
        const b = document.getElementById("menuBtn");
        if (b) b.style.display = window.innerWidth <= 860 ? "grid" : "none";
      };
      window.addEventListener("resize", apply);
      setTimeout(apply, 0);
    })();

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
