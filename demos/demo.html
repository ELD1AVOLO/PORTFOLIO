<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forex Terminal — Démo</title>

  <!-- ====== 4 SCRIPTS CDN OBLIGATOIRES ====== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Plein écran + reset (repris de l'app réelle) */
    html, body, #root { height: 100%; margin: 0; }
    * { box-sizing: border-box; }
    body { background:#050810; font-family:'Inter','Segoe UI',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    .mono { font-family:'JetBrains Mono','SF Mono',Consolas,monospace; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#1E2A40; border-radius:10px; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    @keyframes dropIn { from{opacity:0;transform:translateY(-8px) scale(.98);} to{opacity:1;transform:translateY(0) scale(1);} }
    .fx-tab-content { animation:fadeUp .3s cubic-bezier(.22,1,.36,1); }
    button { font-family:inherit; }
    button:not(:disabled):active { transform:scale(.97); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ====== SOURCE JSX (compilée en runtime classique plus bas) ====== -->
  <script type="text/jsx-source" id="appSrc">
    const { useState, useMemo, useEffect, useRef, createContext, useContext } = React;

    /* =====================================================================
       THÈMES — thème PRO Attijari uniquement (défaut = CLAIR).
       Le thème "Cyber" (sci-fi) a été retiré. Bascule Clair / Sombre.
       ===================================================================== */
    const THEMES = [
      { id:"attijari-light", label:"Attijari Clair", mode:"light",
        bg:"#FFFFFF", surface:"#F7F8FA", surfaceHover:"#EEF0F4", border:"#E2E5EC",
        accent:"#E84C1E", green:"#1E8A3C", red:"#D0230F", amber:"#E87D1E",
        muted:"#9AA3B2", text:"#1A1F2E", dim:"#6B7280", card:"#FFFFFF", headerBg:"#FFFFFF" },
      { id:"attijari-dark", label:"Attijari Sombre", mode:"dark",
        bg:"#0D0D0D", surface:"#181818", surfaceHover:"#222222", border:"#2A2A2A",
        accent:"#FF6B35", green:"#2ECC71", red:"#E74C3C", amber:"#F39C12",
        muted:"#555555", text:"#F0F0F0", dim:"#888888", card:"#1A1A1A", headerBg:"#111111" },
    ];
    const ThemeCtx = createContext(THEMES[0]);     // défaut = Attijari Clair
    const useTheme = () => useContext(ThemeCtx);

    /* ===================== Helpers couleur (repris de l'app) ============== */
    const fmtPrice = (n,d=5) => (typeof n==="number" ? n.toFixed(d) : "—");
    const fmtPips = (n) => typeof n!=="number" ? "—" : (n>=0?"+":"")+n.toFixed(1)+" pips";
    const signColor = (n,T) => typeof n!=="number" ? T.dim : n>0?T.green : n<0?T.red : T.dim;
    const dirColor = (d,T) => d==="UP" ? T.green : d==="DOWN" ? T.red : T.dim;
    const signalColor = (s,T) => s==="STRONG"?T.green : s==="MODERATE"?T.accent : s==="WEAK"?T.amber : T.muted;
    const sigBg = (s,T) => s==="STRONG"?T.green+"18" : s==="MODERATE"?T.accent+"18" : s==="WEAK"?T.amber+"18" : T.muted+"18";
    const cellColor = (v) => {
      if (v>0.5) return {bg:"#065f46",color:"#fff"}; if (v>0.2) return {bg:"#10b981",color:"#fff"};
      if (v>0) return {bg:"#d1fae5",color:"#065f46"}; if (v>-0.2) return {bg:"#fee2e2",color:"#7f1d1d"};
      if (v>-0.5) return {bg:"#ef4444",color:"#fff"}; return {bg:"#7f1d1d",color:"#fff"};
    };

    /* =====================================================================
       DONNÉES FACTICES (mock) — réalistes mais évidemment de démo
       ===================================================================== */
    const mk = (price,chg,digits) => {
      const pip = Math.pow(10,-(digits-1));
      return { price, change_pct:chg, change:+(price*chg/100).toFixed(digits),
        bid:+(price-pip*0.3).toFixed(digits), ask:+(price+pip*0.3).toFixed(digits),
        high:+(price*(1+Math.abs(chg)/100*0.6)).toFixed(digits),
        low:+(price*(1-Math.abs(chg)/100*0.6)).toFixed(digits),
        prices_array: Array.from({length:20},(_,i)=> price*(1+Math.sin(i/3)*0.0006+(i-10)/10*chg/400)) };
    };
    const PAIRS = [
      { pair:"EURUSD", label:"EUR/USD", name:"Euro / US Dollar", flag:"🇪🇺", digits:5, ...mk(1.08453,+0.18,5) },
      { pair:"GBPUSD", label:"GBP/USD", name:"British Pound / US Dollar", flag:"🇬🇧", digits:5, ...mk(1.27310,-0.09,5) },
      { pair:"USDJPY", label:"USD/JPY", name:"US Dollar / Japanese Yen", flag:"🇺🇸", digits:3, ...mk(157.824,+0.34,3) },
      { pair:"USDCHF", label:"USD/CHF", name:"US Dollar / Swiss Franc", flag:"🇨🇭", digits:5, ...mk(0.89215,-0.05,5) },
      { pair:"AUDUSD", label:"AUD/USD", name:"Australian Dollar / US Dollar", flag:"🇦🇺", digits:5, ...mk(0.66412,+0.27,5) },
      { pair:"USDCAD", label:"USD/CAD", name:"US Dollar / Canadian Dollar", flag:"🇨🇦", digits:5, ...mk(1.37088,+0.11,5) },
      { pair:"NZDUSD", label:"NZD/USD", name:"NZ Dollar / US Dollar", flag:"🇳🇿", digits:5, ...mk(0.61240,-0.14,5) },
      { pair:"EURJPY", label:"EUR/JPY", name:"Euro / Japanese Yen", flag:"🇪🇺", digits:3, ...mk(171.205,+0.41,3) },
    ];
    const PMAP = Object.fromEntries(PAIRS.map(p=>[p.pair,p]));
    const getPairMeta = (k) => PMAP[k] || PAIRS[0];
    const PREDICTABLE = PAIRS.map(p=>p.pair);

    // Prédictions IA (cœur de l'app) — forme exacte des PredictionCard
    const PREDICTIONS = {
      EURUSD: [
        { item_hash:"h1", timestamp:"2026-06-26T14:32:08Z", event_name:"Lagarde (BCE) appelle à la prudence sur de nouvelles baisses de taux",
          source:"Reuters", direction:"UP", signal:"STRONG", confidence:0.612,
          pips_15m_pred:6.1, pips_1h_pred:14.2, pips_4h_pred:31.5,
          ai_direction:"bullish_eur", ai_confidence:0.68, ai_reason:"Ton hawkish : la réduction des anticipations d'assouplissement soutient l'EUR." },
        { item_hash:"h2", timestamp:"2026-06-26T13:58:20Z", event_name:"Indice de confiance des consommateurs US en baisse",
          source:"Bloomberg", direction:"UP", signal:"MODERATE", confidence:0.523,
          pips_15m_pred:3.4, pips_1h_pred:8.7, pips_4h_pred:15.2,
          ai_direction:"bearish_usd", ai_confidence:0.55, ai_reason:"Sentiment dégradé : léger affaiblissement du dollar." },
        { item_hash:"h3", timestamp:"2026-06-26T13:30:11Z", event_name:"PMI manufacturier de la zone euro supérieur au consensus",
          source:"FXStreet", direction:"UP", signal:"WEAK", confidence:0.408,
          pips_15m_pred:1.9, pips_1h_pred:4.6, pips_4h_pred:9.1,
          ai_direction:"bullish_eur", ai_confidence:0.47, ai_reason:"Activité industrielle résiliente en zone euro." },
        { item_hash:"h4", timestamp:"2026-06-26T12:50:44Z", event_name:"Le dollar se stabilise avant les minutes de la Fed",
          source:"Investing.com", direction:"DOWN", signal:"MODERATE", confidence:0.501,
          pips_15m_pred:-3.0, pips_1h_pred:-7.4, pips_4h_pred:-13.8,
          ai_direction:"bullish_usd", ai_confidence:0.52, ai_reason:"Prudence avant la Fed : rebond technique de l'USD." },
        { item_hash:"h5", timestamp:"2026-06-26T12:12:03Z", event_name:"Tensions commerciales : appétit pour le risque en hausse",
          source:"Reuters", direction:"UP", signal:"MODERATE", confidence:0.487,
          pips_15m_pred:2.8, pips_1h_pred:6.9, pips_4h_pred:12.0,
          ai_direction:"bullish_eur", ai_confidence:0.50, ai_reason:"Risk-on modéré favorable aux devises pro-cycliques." },
      ],
      GBPUSD: [
        { item_hash:"g1", timestamp:"2026-06-26T13:48:12Z", event_name:"Inflation des services au Royaume-Uni en légère décélération",
          source:"FXStreet", direction:"DOWN", signal:"WEAK", confidence:0.421,
          pips_15m_pred:-2.1, pips_1h_pred:-5.4, pips_4h_pred:-9.8,
          ai_direction:"bearish_gbp", ai_confidence:0.49, ai_reason:"Désinflation : ouvre la voie à la BoE." },
      ],
    };
    const predsFor = (p) => PREDICTIONS[p] || PREDICTIONS.EURUSD;

    // Heatmap : force brute des devises + matrice dérivée
    const CCYS = ["USD","EUR","GBP","JPY","CHF","CAD","AUD","NZD"];
    const RAW = { USD:+0.42, EUR:+0.18, GBP:-0.05, JPY:-0.51, CHF:+0.09, CAD:-0.12, AUD:+0.27, NZD:-0.34 };
    const MATRIX = (() => {
      const m = {};
      for (const b of CCYS) for (const q of CCYS) if (b!==q) m[`${b}/${q}`] = +((RAW[b]-RAW[q])).toFixed(3);
      return m;
    })();
    const RANKING = [...CCYS].sort((a,b)=>RAW[b]-RAW[a]).map(c=>{
      const score = Math.round(((RAW[c]+0.6)/1.2)*100);
      const badge = score>65?"STRONG":score>35?"NEUTRAL":"WEAK";
      return { currency:c, score, rawScore:RAW[c], badge };
    });

    // Scraper : sources RSS
    const SOURCES = [
      { id:1, source:"Reuters FX", url:"https://www.reuters.com/markets/currencies/rss", category:"financial_news", priority:3, enabled:true },
      { id:2, source:"ECB Press", url:"https://www.ecb.europa.eu/rss/press.html", category:"central_bank", priority:3, enabled:true },
      { id:3, source:"FXStreet", url:"https://www.fxstreet.com/rss/news", category:"forex_specialist", priority:2, enabled:true },
      { id:4, source:"Federal Reserve", url:"https://www.federalreserve.gov/feeds/press_all.xml", category:"central_bank", priority:3, enabled:true },
      { id:5, source:"Bloomberg Markets", url:"https://www.bloomberg.com/markets/rss", category:"financial_news", priority:2, enabled:true },
      { id:6, source:"Investing.com Calendar", url:"https://www.investing.com/rss/news.rss", category:"economic_data", priority:1, enabled:false },
    ];

    // Modèles ML par paire
    const MODELS = PAIRS.map((p,i)=>({
      pair:p.pair, label:p.label,
      accuracy:[97.3,94.1,95.8,92.6,96.0,93.4,91.2,94.7][i],
      baseline:[61.5,59.2,62.1,58.0,60.4,57.8,56.9,60.1][i],
      runs:[3,2,4,1,3,2,1,2][i],
      status:["READY","READY","READY","TRAINING","READY","READY","READY","READY"][i],
      rows:[1284,642,931,210,560,488,302,415][i],
    }));

    // Bougies factices (graphique)
    const CANDLES = [
      {o:1.0820,h:1.0828,l:1.0816,c:1.0825},{o:1.0825,h:1.0831,l:1.0822,c:1.0829},
      {o:1.0829,h:1.0833,l:1.0820,c:1.0822},{o:1.0822,h:1.0827,l:1.0815,c:1.0818},
      {o:1.0818,h:1.0824,l:1.0814,c:1.0823},{o:1.0823,h:1.0836,l:1.0821,c:1.0834},
      {o:1.0834,h:1.0841,l:1.0830,c:1.0838},{o:1.0838,h:1.0845,l:1.0835,c:1.0840},
      {o:1.0840,h:1.0844,l:1.0832,c:1.0835},{o:1.0835,h:1.0839,l:1.0828,c:1.0830},
      {o:1.0830,h:1.0842,l:1.0829,c:1.0841},{o:1.0841,h:1.0850,l:1.0839,c:1.0847},
      {o:1.0847,h:1.0852,l:1.0843,c:1.0845},{o:1.0845,h:1.0849,l:1.0840,c:1.0846},
      {o:1.0846,h:1.0851,l:1.0844,c:1.0850},{o:1.0850,h:1.0853,l:1.0843,c:1.0845},
      {o:1.0845,h:1.0848,l:1.0838,c:1.0840},{o:1.0840,h:1.0846,l:1.0837,c:1.0844},
    ];

    /* =====================================================================
       PETITS COMPOSANTS (Dot, Tag, StatCard) — identiques à l'app
       ===================================================================== */
    function Dot({ color, pulse }) {
      return <span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:color,
        flexShrink:0, boxShadow: pulse?`0 0 6px ${color}88, 0 0 12px ${color}44`:"none",
        animation: pulse?"pulse 2s ease-in-out infinite":"none" }}/>;
    }
    function Tag({ label, color, bg }) {
      const T = useTheme();
      const isAccent = color && color!==T.dim && color!==T.muted;
      return <span style={{ display:"inline-block", fontSize:10, fontWeight:600, letterSpacing:"0.08em",
        textTransform:"uppercase", padding:"2px 8px", borderRadius:4, color:color||T.dim,
        background: bg||(isAccent?color+"18":T.surface), border:`1px solid ${color||T.border}33` }}>{label}</span>;
    }

    /* ===================== G10 Switcher (dropdown paires) ================= */
    function G10Switcher({ currentPair, onSelect }) {
      const T = useTheme();
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      const cur = getPairMeta(currentPair);
      useEffect(()=>{ if(!open) return; const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h); },[open]);
      return (
        <div ref={ref} style={{ position:"relative", display:"inline-block" }}>
          <button onClick={()=>setOpen(o=>!o)}
            style={{ display:"inline-flex", alignItems:"center", gap:8, background:"transparent",
              border:`1px solid ${open?T.accent:T.border}`, borderRadius:8, padding:"5px 10px 5px 12px",
              cursor:"pointer", fontWeight:600, fontSize:15, color:T.text }}>
            <span style={{ fontSize:13 }}>{cur.flag}</span><span>{cur.label}</span>
            <span style={{ transform:open?"rotate(180deg)":"none", transition:"transform .25s", fontSize:10, color:T.dim }}>▾</span>
          </button>
          {open && (
            <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, zIndex:50, minWidth:360, maxHeight:360,
              overflowY:"auto", background:T.card+"f2", backdropFilter:"blur(14px)", border:`1px solid ${T.accent}66`,
              borderRadius:12, boxShadow:`0 12px 40px ${T.bg}aa`, padding:6, animation:"dropIn .2s" }}>
              <div style={{ padding:"8px 10px 6px", fontSize:10, color:T.dim, letterSpacing:"0.1em", textTransform:"uppercase", fontWeight:600 }}>G10 Currency Pairs</div>
              {PAIRS.map(p=>{
                const active = p.pair===currentPair, up=p.change_pct>0, down=p.change_pct<0;
                const cc = up?T.green:down?T.red:T.dim;
                return (
                  <div key={p.pair} onClick={()=>{ onSelect(p.pair); setOpen(false); }}
                    onMouseEnter={e=>e.currentTarget.style.background=T.surfaceHover}
                    onMouseLeave={e=>e.currentTarget.style.background=active?T.accent+"14":"transparent"}
                    style={{ display:"grid", gridTemplateColumns:"24px 1fr 70px 64px", alignItems:"center", gap:10,
                      padding:"9px 10px", borderRadius:8, cursor:"pointer", background:active?T.accent+"14":"transparent",
                      borderLeft:active?`2px solid ${T.accent}`:"2px solid transparent" }}>
                    <span style={{ fontSize:14 }}>{p.flag}</span>
                    <div style={{ minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:active?T.accent:T.text }}>{p.label}</div>
                      <div style={{ fontSize:10, color:T.dim, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.name}</div>
                    </div>
                    <div className="mono" style={{ fontSize:12, color:T.text, textAlign:"right" }}>{fmtPrice(p.price,p.digits)}</div>
                    <div className="mono" style={{ fontSize:11, fontWeight:600, color:cc, textAlign:"right" }}>
                      {up?"▲":down?"▼":"−"} {Math.abs(p.change_pct).toFixed(2)}%
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ===================== LivePrice (bandeau Dashboard) ================= */
    function LivePrice({ pair, onPair }) {
      const T = useTheme();
      const d = getPairMeta(pair);
      const up = d.change_pct>=0;
      const Stat = ({label,value,sub,vc}) => (
        <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:"14px 18px" }}>
          <div style={{ fontSize:11, color:T.dim, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
          <div className="mono" style={{ fontSize:22, fontWeight:600, color:vc||T.text }}>{value}</div>
          {sub && <div className="mono" style={{ fontSize:12, color:T.dim, marginTop:3 }}>{sub}</div>}
        </div>
      );
      return (
        <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:"20px 24px", marginBottom:20 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <Dot color={T.green} pulse/>
              <G10Switcher currentPair={pair} onSelect={onPair}/>
              <Tag label="Market Open" color={T.green}/>
            </div>
            <span style={{ fontSize:11, color:T.dim }}>Updated {new Date().toLocaleTimeString()}</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1.4fr 1fr 1fr 1fr", gap:12, alignItems:"stretch" }}>
            <div>
              <div style={{ fontSize:11, color:T.dim, marginBottom:4, letterSpacing:"0.07em", textTransform:"uppercase" }}>Price</div>
              <div className="mono" style={{ fontSize:32, fontWeight:700, color: up?T.green:T.red }}>{fmtPrice(d.price,d.digits)}</div>
              <div className="mono" style={{ fontSize:13, color:signColor(d.change,T), marginTop:4 }}>
                {up?"▲":"▼"} {fmtPrice(Math.abs(d.change),d.digits)} ({(up?"+":"")+d.change_pct.toFixed(3)}%)
              </div>
            </div>
            <Stat label="Bid" value={fmtPrice(d.bid,d.digits)} vc={T.red}/>
            <Stat label="Ask" value={fmtPrice(d.ask,d.digits)} vc={T.green}/>
            <Stat label="High / Low" value={fmtPrice(d.high,d.digits)} sub={`Low: ${fmtPrice(d.low,d.digits)}`}/>
          </div>
        </div>
      );
    }

    /* ===================== PredictionCard (identique à l'app) ============ */
    function PredictionCard({ pred, isNew }) {
      const T = useTheme();
      const dir=pred.direction, signal=pred.signal;
      const conf=typeof pred.confidence==="number"?(pred.confidence*100).toFixed(0)+"%":"—";
      const title=pred.event_name||pred.title||"(no title)";
      const ts=pred.timestamp?new Date(pred.timestamp).toLocaleString():"";
      const aiConf=typeof pred.ai_confidence==="number"?(pred.ai_confidence*100).toFixed(0)+"%":null;
      return (
        <div style={{ background:T.surface, border:`1px solid ${isNew?T.accent:T.border}`, borderRadius:12,
          padding:"16px 18px", marginBottom:10, opacity:signal==="NONE"?0.7:1, position:"relative" }}>
          <div style={{ height:4, borderRadius:"12px 12px 0 0", background:signal==="NONE"?"transparent":signalColor(signal,T),
            margin:"-16px -18px 14px -18px", opacity:0.7 }}/>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12, marginBottom:10 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, fontWeight:600, color:T.text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{title}</div>
              <div style={{ display:"flex", gap:6, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
                {pred.source && <Tag label={pred.source}/>}{ts && <span style={{ fontSize:11, color:T.dim }}>{ts}</span>}
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:5, flexShrink:0 }}>
              <Tag label={signal||"NONE"} color={signalColor(signal,T)} bg={sigBg(signal,T)}/>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:14, fontWeight:700, color:dirColor(dir,T) }}>{dir==="UP"?"▲ UP":dir==="DOWN"?"▼ DOWN":"— FLAT"}</span>
                <span style={{ fontSize:12, color:T.dim }}>{conf}</span>
              </div>
            </div>
          </div>
          <div style={{ height:2, background:T.border, borderRadius:1, marginBottom:10, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${Math.round((pred.confidence||0)*100)}%`, background:signalColor(signal,T), borderRadius:1, transition:"width .6s" }}/>
          </div>
          <div style={{ display:"flex", gap:12, marginBottom:10 }}>
            {[["15m",pred.pips_15m_pred],["1h",pred.pips_1h_pred],["4h",pred.pips_4h_pred]].map(([lbl,val])=>(
              <div key={lbl} style={{ textAlign:"center" }}>
                <div style={{ fontSize:10, color:T.dim, marginBottom:2 }}>{lbl}</div>
                <div className="mono" style={{ fontSize:13, fontWeight:600, color:signColor(val,T) }}>{fmtPips(val)}</div>
              </div>
            ))}
          </div>
          {pred.ai_direction && (
            <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", background:T.bg+"80", border:`1px solid ${T.border}`, borderRadius:6 }}>
              <Dot color={T.accent}/>
              <span style={{ fontSize:11, color:T.dim }}>AI:</span>
              <span style={{ fontSize:11, color:dirColor(pred.ai_direction.includes("bull")?"UP":pred.ai_direction.includes("bear")?"DOWN":"",T), fontWeight:600 }}>{pred.ai_direction}</span>
              {aiConf && <span style={{ fontSize:11, color:T.dim }}>{aiConf}</span>}
              {pred.ai_reason && <span style={{ fontSize:11, color:T.dim, marginLeft:4, fontStyle:"italic", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>— {pred.ai_reason}</span>}
            </div>
          )}
        </div>
      );
    }

    function FilterSelect({ label, value, onChange, options }) {
      const T = useTheme();

    /* ===================== PredictionChart (Actual vs AI Predicted) =====
       Reproduit le PriceChart du Dashboard : ligne "actual" (trait plein)
       + ligne "AI predicted (+1h)" (pointillés ambre) + ligne Live de réf.
       ==================================================================== */
    // Génère une série déterministe (actual + predicted) selon la paire & l'horizon
    function genSeries(pair, hours) {
      const meta = getPairMeta(pair);
      const base = meta.price, amp = base * 0.0016;
      const n = Math.max(8, Math.round(hours));   // ~1 point / heure
      const now = new Date(), pts = [];
      for (let i=0;i<n;i++) {
        const t = new Date(now.getTime() - (n-1-i)*(hours/(n-1))*3600*1000);
        const wave  = Math.sin(i/2.3)*amp + Math.sin(i/5.0)*amp*0.6;
        const trend = (i/n)*amp*(meta.change_pct>=0?1.4:-1.4);
        const actual = base - amp*0.8 + wave + trend;
        const bias = amp*0.5*(meta.change_pct>=0?1:-1);                 // forecast +1h
        const predicted = actual + bias + Math.sin(i/1.7)*amp*0.25;
        pts.push({
          label: t.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }),
          actual: +actual.toFixed(meta.digits),
          predicted: i >= Math.floor(n*0.35) ? +predicted.toFixed(meta.digits) : null,  // prédictions sur la partie récente
        });
      }
      return { points:pts, current:pts[pts.length-1].actual, digits:meta.digits, n };
    }

    function PredictionChart({ pair }) {
      const T = useTheme();
      const meta = getPairMeta(pair);
      const [hours, setHours] = useState(24);
      const { points, current, digits, n } = useMemo(()=>genSeries(pair,hours),[pair,hours]);

      const W=820, H=260, padL=64, padR=14, padT=12, padB=22;
      const vals = points.flatMap(p=>[p.actual,p.predicted]).filter(v=>v!=null);
      const min = Math.min(...vals), max = Math.max(...vals), range=(max-min)||1;
      const x = i => padL + i*(W-padL-padR)/(points.length-1);
      const y = v => padT + (max-v)/range*(H-padT-padB);
      const polyFor = key => points.map((p,i)=> p[key]==null?null:`${x(i).toFixed(1)},${y(p[key]).toFixed(1)}`).filter(Boolean).join(" ");
      const yTicks = [0,1,2,3].map(k=> min + range*k/3);
      const xIdx = [...new Set([0, Math.floor(n/3), Math.floor(2*n/3), n-1])];

      return (
        <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:"20px 24px", marginBottom:20 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Dot color={T.accent} pulse/>
              <span style={{ fontWeight:600, fontSize:15, color:T.text }}>{meta.label} — Actual vs AI Predicted</span>
              <Tag label={`Live ${current.toFixed(digits)}`} color={T.accent}/>
              <Tag label={`${n} pts`} color={T.dim}/>
            </div>
            <div style={{ display:"flex", gap:4 }}>
              {[6,12,24,48,72].map(h=>(
                <button key={h} onClick={()=>setHours(h)} style={{ background:hours===h?T.accent+"22":"none",
                  border:`1px solid ${hours===h?T.accent:T.border}`, borderRadius:6, color:hours===h?T.accent:T.dim,
                  fontSize:11, padding:"4px 10px", cursor:"pointer", fontWeight:hours===h?600:400 }}>{h}h</button>
              ))}
            </div>
          </div>
          {/* Légende */}
          <div style={{ display:"flex", gap:16, marginBottom:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:20, height:2, background:T.accent, borderRadius:1 }}/><span style={{ fontSize:11, color:T.dim }}>Actual price</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:12, height:2, background:T.amber }}/><div style={{ width:4, height:4, borderRadius:"50%", background:T.amber }}/><div style={{ width:12, height:2, background:T.amber }}/>
              <span style={{ fontSize:11, color:T.dim }}>AI predicted (+1h)</span>
            </div>
          </div>
          {/* Graphique SVG (remplace Recharts — aucune lib externe) */}
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="260" style={{ display:"block" }}>
            {yTicks.map((v,i)=>(
              <g key={i}>
                <line x1={padL} x2={W-padR} y1={y(v)} y2={y(v)} stroke={T.border} strokeDasharray="3 3"/>
                <text x={padL-8} y={y(v)+3} textAnchor="end" fontSize="10" fill={T.dim} fontFamily="monospace">{v.toFixed(digits-1)}</text>
              </g>
            ))}
            {xIdx.map(i=>(<text key={i} x={x(i)} y={H-5} textAnchor="middle" fontSize="10" fill={T.dim}>{points[i].label}</text>))}
            {/* Ligne Live (référence verte) */}
            <line x1={padL} x2={W-padR} y1={y(current)} y2={y(current)} stroke={T.green} strokeDasharray="4 2"/>
            <text x={W-padR-2} y={y(current)-4} textAnchor="end" fontSize="10" fill={T.green}>Live {current.toFixed(digits)}</text>
            {/* Predicted (pointillés ambre + points) */}
            <polyline points={polyFor("predicted")} fill="none" stroke={T.amber} strokeWidth="1.5" strokeDasharray="5 3"/>
            {points.map((p,i)=> p.predicted!=null ? <circle key={i} cx={x(i)} cy={y(p.predicted)} r="2.6" fill={T.amber}/> : null)}
            {/* Actual (trait plein accent) */}
            <polyline points={polyFor("actual")} fill="none" stroke={T.accent} strokeWidth="2"/>
          </svg>
        </div>
      );
    }

          {CANDLES.map((d,i)=>{

              <rect x={x-cw*0.3} width={cw*0.6} y={top} height={Math.max(2,bot-top)} fill={col} rx="1"/>

          })}

    /* ===================== SCRAPER ===================================== */
    function ScraperManager() {
      const T = useTheme();
      const [running,setRunning]=useState(true);
      const [search,setSearch]=useState("");
      const [activePair,setActivePair]=useState("EURUSD");
      const [dropOpen,setDropOpen]=useState(false);
      const ref=useRef(null);
      useEffect(()=>{ if(!dropOpen) return; const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setDropOpen(false); };
        document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h); },[dropOpen]);
      const filtered = SOURCES.filter(s=>!search||s.source.toLowerCase().includes(search.toLowerCase())||s.url.toLowerCase().includes(search.toLowerCase()));
      const btn=(c=T.accent)=>({ background:"none", border:`1px solid ${c}33`, borderRadius:6, color:c, fontSize:12, padding:"6px 12px", cursor:"pointer" });
      const inp={ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, color:T.text, fontSize:13, padding:"7px 10px" };
      const active=getPairMeta(activePair);
      return (
        <div>
          {/* Carte Live Scraper */}
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, padding:"20px 24px", marginBottom:20 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <Dot color={running?T.green:T.muted} pulse={running}/>
                <span style={{ fontWeight:600, fontSize:15, color:T.text }}>Live Scraper</span>
                {running && <Tag label="PID 24817" color={T.green}/>}
                <Tag label="12m 43s" color={T.dim}/>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                {!running
                  ? <button onClick={()=>setRunning(true)} style={{...btn(T.green),fontWeight:600}}>▶ Start</button>

                <button style={btn(T.dim)}>Logs</button>
              </div>
            </div>
            {/* Sélecteur de paire */}
            <div ref={ref} style={{ marginTop:16, position:"relative" }}>
              <button onClick={()=>setDropOpen(o=>!o)} style={{ width:"100%", display:"flex", alignItems:"center", gap:14,
                background:`linear-gradient(135deg,${T.accent}10 0%,${T.bg} 60%)`, border:`1px solid ${dropOpen?T.accent+"66":T.border}`,
                borderRadius:12, padding:"14px 18px", cursor:"pointer" }}>
                <span style={{ fontSize:22 }}>{active.flag}</span>
                <div style={{ flex:1, textAlign:"left" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:15, fontWeight:700, color:T.accent }}>{active.label}</span><Dot color={T.green} pulse={running}/></div>
                  <div style={{ fontSize:11, color:T.dim, marginTop:2 }}><span className="mono" style={{ color:T.text, fontWeight:600 }}>{(MODELS.find(m=>m.pair===activePair)||{}).rows.toLocaleString()}</span> news collected</div>
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.dim} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ transform:dropOpen?"rotate(180deg)":"none", transition:"transform .3s" }}><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              {dropOpen && (
                <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, right:0, zIndex:20, background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, boxShadow:"0 12px 40px #00000066", padding:6, maxHeight:300, overflowY:"auto", animation:"dropIn .22s" }}>
                  {PAIRS.map(p=>{ const a=activePair===p.pair, rows=(MODELS.find(m=>m.pair===p.pair)||{}).rows;
                    return (
                      <button key={p.pair} onClick={()=>{ setActivePair(p.pair); setDropOpen(false); }} style={{ width:"100%", display:"flex", alignItems:"center", gap:12,
                        background:a?T.accent+"15":"transparent", border:`1px solid ${a?T.accent+"44":"transparent"}`, borderRadius:8, padding:"10px 12px", cursor:"pointer", textAlign:"left" }}>
                        <span style={{ fontSize:18 }}>{p.flag}</span>
                        <div style={{ flex:1 }}><span style={{ fontSize:13, fontWeight:700, color:a?T.accent:T.text }}>{p.label}</span><div className="mono" style={{ fontSize:10, color:T.dim, marginTop:1 }}>{rows.toLocaleString()} news</div></div>
                        {a && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <div style={{ marginTop:12, fontSize:11, color:T.dim, display:"flex", gap:20, flexWrap:"wrap" }}>
              <span>Python: <span style={{ color:T.text }}>python.exe</span></span>
              <span>Venv: <span style={{ color:T.green }}>detected</span></span>
              <span>Last news: <span style={{ color:T.text }}>{new Date().toLocaleTimeString()}</span></span>
            </div>
          </div>

          {/* Sources RSS */}
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
            <span style={{ fontWeight:600, fontSize:15, color:T.text }}>RSS Sources</span>
            <Tag label={`${SOURCES.length}`} color={T.accent}/>
            <input value={search} placeholder="Search by name, URL, category..." onChange={e=>setSearch(e.target.value)} style={{...inp,flex:1,minWidth:180}}/>
            <button style={{...btn(T.accent),fontWeight:600}}>+ Add source</button>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {filtered.map((src,idx)=>(
              <div key={src.id} style={{ background:T.surface, border:`1px solid ${src.enabled?T.border:T.muted+"44"}`, borderTop:`3px solid ${src.enabled?T.accent:T.muted}`, borderRadius:10, padding:"12px 16px", opacity:src.enabled?1:0.6 }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:10 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:600, fontSize:13, color:T.text }}>{src.source}</span>
                      <Tag label={src.category} color={T.dim}/>
                      <Tag label={`P${src.priority}`} color={src.priority===3?T.green:src.priority===2?T.accent:T.muted}/>
                      {!src.enabled && <Tag label="disabled" color={T.muted}/>}
                    </div>
                    <div style={{ fontSize:11, color:T.dim, wordBreak:"break-all" }}>{src.url}</div>
                  </div>
                  <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                    <button style={btn(T.accent)}>Test</button>
                    <button style={btn(T.amber)}>Edit</button>
                    <button style={btn(src.enabled?T.muted:T.green)}>{src.enabled?"Disable":"Enable"}</button>
                    <button style={btn(T.red)}>Delete</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AttijariLogo({ size=38 }) {
      return (
        <img src={ATTIJARI_LOGO} alt="Attijariwafa bank"
          style={{ width:size, height:size, objectFit:"contain", flexShrink:0 }}/>
      );
    }

    function MarketStatusMini({ collapsed }) {
      const T = useTheme();
      return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:collapsed?"center":"flex-start", gap:8, padding:collapsed?"8px 0":"8px 10px", marginBottom:8, borderRadius:8, background:T.green+"10", border:`1px solid ${T.green}33` }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:T.green, boxShadow:`0 0 6px ${T.green}`, flexShrink:0, animation:"pulse 2.5s ease-in-out infinite" }}/>
          {!collapsed && <div><div style={{ fontSize:11, fontWeight:700, color:T.green }}>Marché OVERLAP</div><div style={{ fontSize:9, color:T.amber }}>Londres + NY — haute volatilité</div></div>}
        </div>
      );
    }

    /* ===== Icônes thème (SVG inline) : soleil = clair, lune = sombre ===== */
    const SunIcon = ({ c, size=15 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
      </svg>
    );
    const MoonIcon = ({ c, size=15 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    );
    const themeGlyph = (id, c, size) => id==="attijari-dark"
      ? <MoonIcon c={c} size={size}/> : <SunIcon c={c} size={size}/>;

    // Sélecteur de thème pro : toggle segmenté Clair / Sombre avec icônes
    function ThemeToggle({ themeId, switchTheme, collapsed }) {
      const T = useTheme();
      return (
        <div style={{ display:"flex", gap:4, background:T.bg, border:`1px solid ${T.border}`, borderRadius:9, padding:3 }}>
          {THEMES.map(t=>{
            const active = themeId===t.id;
            const short = t.mode==="dark" ? "Sombre" : "Clair";
            return (
              <button key={t.id} onClick={()=>switchTheme(t.id)} title={t.label}
                style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                  padding: collapsed?"7px 0":"6px 8px", border:"none", borderRadius:7, cursor:"pointer",
                  background: active ? T.accent+"1F" : "transparent", color: active ? T.accent : T.dim,
                  fontSize:11, fontWeight: active?700:500, boxShadow: active?`inset 0 0 0 1px ${T.accent}55`:"none",
                  transition:"all .18s ease" }}>
                {themeGlyph(t.id, active?T.accent:T.dim, 15)}
                {!collapsed && <span>{short}</span>}
              </button>
            );
          })}
        </div>
      );
    }

    function SideNav({ tab, onNavigate, collapsed, onToggle, themeId, switchTheme }) {
      const T = useTheme();
      const sections=[...new Set(NAV_ITEMS.map(i=>i.section))];
      return (
        <nav style={{ position:"fixed", top:0, left:0, bottom:0, width:collapsed?68:236, zIndex:100, display:"flex", flexDirection:"column",
          background:T.headerBg, borderRight:`1px solid ${T.border}`, boxShadow:"2px 0 16px rgba(0,0,0,0.12)", transition:"width .25s", overflow:"hidden" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:collapsed?"center":"flex-start", gap:10, padding:collapsed?"14px 8px":"14px 16px", borderBottom:`1px solid ${T.border}`, minHeight:69 }}>
            <AttijariLogo size={38}/>
            {!collapsed && <div style={{ minWidth:0 }}>
              <div style={{ fontSize:13, fontWeight:700, color:T.text, whiteSpace:"nowrap" }}>Forex Terminal</div>
              <div style={{ fontSize:8.5, color:T.dim, letterSpacing:".14em", textTransform:"uppercase" }}>Attijariwafa bank</div>
            </div>}
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"12px 10px" }}>
            {sections.map(sec=>(
              <div key={sec} style={{ marginBottom:16 }}>
                {collapsed
                  ? <div style={{ height:1, background:T.border, margin:"0 8px 10px" }}/>
                  : <div style={{ fontSize:9, fontWeight:700, color:T.muted, letterSpacing:".16em", textTransform:"uppercase", padding:"0 10px", marginBottom:6 }}>{sec}</div>}
                {NAV_ITEMS.filter(i=>i.section===sec).map(item=>{
                  const active=tab===item.id;
                  return (
                    <button key={item.id} title={item.desc} onClick={()=>onNavigate(item.id)}
                      onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background=T.surfaceHover; e.currentTarget.style.color=T.text; } }}
                      onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background="transparent"; e.currentTarget.style.color=T.dim; } }}
                      style={{ display:"flex", alignItems:"center", justifyContent:collapsed?"center":"flex-start", gap:11, width:"100%",
                        padding:collapsed?"11px 0":"10px 12px", marginBottom:3, border:"none", borderRadius:8, cursor:"pointer",
                        background:active?T.accent+"16":"transparent", color:active?T.accent:T.dim, fontSize:12.5, fontWeight:active?700:500, position:"relative", whiteSpace:"nowrap" }}>
                      {active && <div style={{ position:"absolute", left:0, top:"50%", transform:"translateY(-50%)", width:3, height:"58%", borderRadius:"0 3px 3px 0", background:T.accent, boxShadow:`0 0 8px ${T.accent}AA` }}/>}
                      <span style={{ display:"flex", flexShrink:0 }}>{item.icon(active?T.accent:"currentColor")}</span>
                      {!collapsed && <span style={{ flex:1, textAlign:"left" }}>{item.label}</span>}
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
          <div style={{ borderTop:`1px solid ${T.border}`, padding:10 }}>
            <MarketStatusMini collapsed={collapsed}/>
            <div style={{ marginBottom:8 }}>
              <ThemeToggle themeId={themeId} switchTheme={switchTheme} collapsed={collapsed}/>
            </div>
            <button onClick={onToggle} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, width:"100%", padding:"8px 0",
              border:`1px solid ${T.border}`, borderRadius:8, cursor:"pointer", background:"transparent", color:T.dim, fontSize:11, fontWeight:600 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ transform:collapsed?"rotate(180deg)":"none" }}><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
              {!collapsed && "Réduire"}
            </button>
          </div>
        </nav>
      );
    }

      const [open,setOpen]=useState(false);

        <>

              <div style={{ padding:"12px 14px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", gap:8 }}>
                <Dot color={T.accent} pulse/><span style={{ fontSize:13, fontWeight:700, color:T.text }}>Owl Alpha</span>

              </div>
              <div style={{ padding:14, fontSize:12, color:T.dim, lineHeight:1.5 }}>

                <div style={{ background:T.bg, padding:"8px 10px", borderRadius:8 }}>La BCE a adopté un ton plus restrictif, réduisant les anticipations de baisses de taux — signal haussier EUR détecté à 61 %.</div>
              </div>
            </div>
          )}
          <div onClick={()=>setOpen(o=>!o)} style={{ position:"fixed", bottom:28, right:28, zIndex:1000, width:52, height:52, borderRadius:"50%",

            boxShadow:open?"none":`0 0 20px ${T.accent}44`, fontSize:22 }}>{open?"✕":"🦉"}</div>

    /* ===================== APP ======================================== */
    function App() {
      const [tab,setTab]=useState("dashboard");
      const [themeId,setThemeId]=useState("attijari-light");   // démarre sur le thème PRO clair
      const [collapsed,setCollapsed]=useState(false);
      const [pair,setPair]=useState("EURUSD");
      const T = THEMES.find(t=>t.id===themeId)||THEMES[0];
      const current = NAV_ITEMS.find(i=>i.id===tab)||NAV_ITEMS[0];
      return (
        <ThemeCtx.Provider value={T}>
          <div style={{ background:T.bg, height:"100%", overflowY:"auto", color:T.text }}>
            <SideNav tab={tab} onNavigate={setTab} collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)} themeId={themeId} switchTheme={setThemeId}/>
            <main style={{ marginLeft:collapsed?68:236, minHeight:"100%", transition:"margin-left .25s" }}>
              <header style={{ position:"sticky", top:0, zIndex:80, display:"flex", alignItems:"center", justifyContent:"space-between", gap:16,
                flexWrap:"wrap", padding:"13px 28px", background:T.headerBg+"F0", backdropFilter:"blur(14px)", borderBottom:`1px solid ${T.border}` }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:10, flexWrap:"wrap" }}>
                  <h1 style={{ fontSize:17, fontWeight:700, color:T.text, margin:0 }}>{current.label}</h1>
                  <span style={{ fontSize:10, color:T.dim, letterSpacing:".08em", textTransform:"uppercase" }}>{current.desc}</span>
                </div>
                <span style={{ fontSize:10, fontWeight:700, padding:"3px 10px", borderRadius:20, background:T.accent+"18", color:T.accent, border:`1px solid ${T.accent}44`, letterSpacing:".06em" }}>DÉMO PORTFOLIO</span>
              </header>
              <div style={{ padding:"20px 28px", maxWidth:1480, margin:"0 auto" }}>
                <HealthBar/>
                <div key={tab} className="fx-tab-content">
                  {tab==="dashboard" && <Dashboard pair={pair} onPair={setPair}/>}
                  {tab==="chart" && <ChartTab pair={pair} onPair={setPair}/>}
                  {tab==="heatmap" && <Heatmap/>}
                  {tab==="scraper" && <ScraperManager/>}
                  {tab==="model" && <ModelManager/>}
                  {tab==="settings" && <SettingsPage themeId={themeId} switchTheme={setThemeId}/>}
                </div>
              </div>
            </main>
            <ChatFab/>
          </div>
        </ThemeCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- ====== COMPILATION JSX EN RUNTIME CLASSIQUE (obligatoire) ====== -->
  <script>
    (function () {
      var run = function () {
        var src = document.getElementById("appSrc").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        (0, eval)(out);
      };
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", run);
      else run();
    })();
  </script>
</body>
</html>
